name: Refresh data

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch fresh data
        run: |
          node scripts/fetch-crime.mjs
          node scripts/fetch-rightmove-ids.mjs
          node scripts/fetch-community.mjs brazilian
          node scripts/build-areas.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data)" ]; then
            git config user.name "data-bot"
            git config user.email "actions@github.com"
            git add data
            git commit -m "Data refresh: $(date +%Y-%m-%d)"
            git push
          else
            echo "no changes"
          fi
